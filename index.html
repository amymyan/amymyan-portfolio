<style>
  /* ============================================================
     HOME PAGE — 2x2 photo grid
     ============================================================
     Four tiles, each linking to one section of the site. Each
     tile is one photo + one left-aligned caption underneath it.

     --home-gutter controls ALL the spacing at once — the gap
     between the 2 columns/rows AND the space on the left/right
     edges of the screen. Because both use the same variable,
     the spacing stays equal on both sides and in the middle no
     matter what number you pick. Raise it for more breathing
     room between photos, lower it to pack them tighter.
     ============================================================ */

  .home-grid{
    --home-gutter: clamp(1.5rem, 4vw, 4rem);

    display:grid;
    grid-template-columns:1fr 1fr;   /* 2 columns = 2x2 layout */
    gap:var(--home-gutter);
    width:100%;                      /* full width of the screen, not a
                                           narrow centered column anymore */
    margin:2.5rem 0;
    padding:0 var(--home-gutter);    /* same spacing as the gap above,
                                           so the left/right edges match
                                           the middle gap exactly */
  }

  /* On narrow phone screens, stack into a single column instead
     of squeezing 2 tiny columns side by side. */
  @media (max-width:560px){
    .home-grid{ grid-template-columns:1fr; }
  }

  .home-tile{
    display:block;
  }

  .home-tile-photo{
    aspect-ratio:1/1;         /* keeps each tile square — change to
                                   4/5 or 3/4 for a taller rectangle */
    background:var(--line);  /* light gray shown until you add a photo */
    overflow:hidden;
  }

  .home-tile-photo img{
    width:100%;
    height:100%;
    object-fit:cover;         /* fills the square without stretching */
    display:block;
    transition:opacity 0.2s ease;
  }

  .home-tile:hover .home-tile-photo img{ opacity:0.85; }

  .home-tile-caption{
    text-align:left;          /* caption sits left-aligned under the photo */
    font-family:var(--mono);
    font-size:1.25rem;        /* bumped up from 0.85rem so captions read
                                   clearly against the bigger photos */
    padding:0.75rem 0 0;
  }
</style>
</head>
