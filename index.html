<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amy Myan</title>
<meta name="description" content="Amy Myan — photographer based in Los Angeles, CA">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/home-filmstrip.css?v=20260720zzp">
</head>
<body>

<main id="home-film" class="home-film">
  <h1 class="home-film-wordmark">
    <span class="wordmark-deco">✮⋆˙</span>
    <span class="wordmark-name">Amy Myan</span>
    <span class="wordmark-deco">˙⋆✮</span>
  </h1>

  <p class="home-film-loading">loading film…</p>

  <div class="home-film-stage">
    <div class="home-film-assembly">
      <div class="home-film-viewport">
        <div class="home-film-gate-mark" aria-hidden="true"></div>
        <div class="home-film-roll">
          <div class="home-film-track">
            <div class="home-film-edge home-film-edge--top">
              <div class="home-film-sprocket home-film-sprocket--top" aria-hidden="true"></div>
            </div>
            <div class="home-film-strip" aria-live="polite"></div>
            <div class="home-film-edge home-film-edge--bottom">
              <div class="home-film-sprocket home-film-sprocket--bottom" aria-hidden="true"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="home-film-controls">
      <button type="button" class="home-film-nav home-film-nav--prev" aria-label="Previous section">←</button>
      <button type="button" class="home-film-nav home-film-nav--next" aria-label="Next section">→</button>
    </div>
  </div>

  <div class="home-film-grain" aria-hidden="true"></div>
</main>

<footer class="site-footer">
  <span>&copy; <span id="year"></span> Amy Myan</span>
  <span>
    <a href="http://instagram.com/amymyan" target="_blank" rel="noopener">instagram</a>
    &nbsp;·&nbsp;
    <a href="mailto:hello@amymyan.com">email</a>
  </span>
</footer>

<script src="js/config.js"></script>
<script src="js/amy-media.js?v=20260720zn"></script>
<script src="js/home-data.js?v=20260720zx"></script>
<script src="js/home-film-sound.js?v=20260720zzb"></script>
<script src="js/home-filmstrip.js?v=20260720zzk"></script>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
<script src="js/galaxy.js" defer></script>
</body>
</html>
