  }
  .about-lines{
    text-align:center;
    font-family:var(--body);
    font-style:normal;
    font-size:0.95rem;
    line-height:1.7;
    margin:0 0 2.5rem;
  }
  .about-contact{
    text-align:center;
    font-family:var(--body);
    font-size:0.95rem;
    line-height:1.7;
    margin:0;
  }
  .about-contact a{ text-decoration:underline; text-underline-offset:3px; }

<script src="js/config.js"></script>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

(function loadAboutPhoto() {
  const photo2 = document.getElementById('about-photo2');
  if (!photo2 || typeof mediaSrc !== 'function') return;

  photo2.src = mediaSrc('assets/about/photo2.jpeg');

  photo2.addEventListener('error', () => {
    const frame = photo2.closest('.about-photo');
    if (frame) frame.hidden = true;
  });
})();
</script>
