<!-- ============================================================
     This page is a BOARD, same system as music.html, EXCEPT:
       - data-show-captions="true" — each cover photo shows its
         project title underneath it
       - each entry in data/projects.json has an "href" pointing
         at that project's own page, so CLICKING a cover photo (or
         its caption) navigates there instead of opening a lightbox

     To add a new project:
       1. Duplicate project-example.html, rename it (e.g. project-tour-2026.html)
       2. Duplicate data/project-example.json, rename it to match
       3. Change the new HTML file's <script> data-source to point
          at your new JSON file
       4. Create a new assets/<your-project-name>/ folder for its photos
       5. Add a new entry to data/projects.json with an "href"
          pointing at your new page, and a "caption" as its title
       6. In organizer.html, add your project to both dropdowns
          (see the comments in js/organizer.js)
     ============================================================ -->

<main id="board" class="board" data-source="data/projects.json" data-show-captions="true"></main>
